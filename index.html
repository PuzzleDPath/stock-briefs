<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Briefs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#efe6d8">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Briefs">
<script src="/pwa.js" defer></script>
<style>
  :root{
    --buy:    oklch(0.50 0.10 145);
    --buy-bg: oklch(0.93 0.045 145);
    --watch:  oklch(0.56 0.11 68);
    --watch-bg:oklch(0.94 0.05 80);
    --pass:   oklch(0.52 0.13 33);
    --pass-bg:oklch(0.93 0.05 38);
    --none:   #8a7c64;
    --none-bg:#e9dfcc;
    --display:'Patrick Hand', 'Mali', cursive;
    --body:'Nunito Sans', 'Mali', system-ui, sans-serif;
    --mono:'Patrick Hand', 'Mali', cursive;
  }
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:var(--body); background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }

  /* ---------------- top bar ---------------- */
  .topbar{
    position:sticky; top:0; z-index:30;
    display:flex; align-items:center; gap:18px;
    padding:14px 26px;
    background:color-mix(in srgb, var(--paper) 92%, transparent);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .brand{ display:flex; align-items:baseline; gap:10px; flex:none; }
  .brand .mark{ font-family:var(--display); font-weight:600; font-size:22px; letter-spacing:-.01em; }
  .brand .sub{ font-size:12px; color:var(--ink-soft); }
  .topbar .spacer{ flex:1; }
  .search{
    display:flex; align-items:center; gap:9px; flex:none;
    width:230px; max-width:38vw; padding:8px 14px;
    background:var(--card-2); border:1px solid var(--line); border-radius:999px;
  }
  .search:focus-within{ border-color:var(--accent); }
  .search input{ border:none; background:transparent; outline:none; width:100%; font-family:var(--body); font-size:14px; color:var(--ink); }
  .search .mag{ width:13px; height:13px; border:2px solid var(--ink-faint); border-radius:999px; position:relative; flex:none; }
  .search .mag::after{ content:''; position:absolute; width:6px; height:2px; background:var(--ink-faint); bottom:-3px; right:-3px; transform:rotate(45deg); }

  /* ---------------- shell ---------------- */
  .shell{ display:grid; grid-template-columns:72px 340px 1fr; height:calc(100vh - 59px); }
  /* บนเดสก์ท็อป rail เป็นคอลัมน์ในกริด (เต็มความสูง shell) ไม่ต้อง sticky/100vh */
  @media (min-width:821px){ .shell > .rail{ position:static; height:auto; top:auto; } }

  /* sidebar */
  .sidebar{ border-right:1px solid var(--line); overflow:auto; background:var(--paper); }
  .filters{ display:flex; gap:6px; flex-wrap:wrap; padding:16px 18px 12px; position:sticky; top:0;
    background:var(--paper); border-bottom:1px solid var(--line-soft); z-index:2; }
  .chip{
    font-family:var(--body); font-size:12px; font-weight:600; cursor:pointer;
    padding:6px 12px; border-radius:999px; border:1px solid var(--line);
    background:transparent; color:var(--ink-soft); display:inline-flex; align-items:center; gap:6px;
  }
  .chip:hover{ border-color:var(--accent); color:var(--ink); }
  .chip.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .chip .c-dot{ width:8px; height:8px; border-radius:999px; }

  .list{ padding:8px 12px 40px; }
  .item{
    display:grid; grid-template-columns:54px 1fr; gap:12px; align-items:start;
    padding:14px 14px; border-radius:12px; cursor:pointer; transition:background .12s;
    border:1px solid transparent;
  }
  .item + .item{ margin-top:2px; }
  .item:hover{ background:var(--card); }
  .item.active{ background:var(--card-2); border-color:var(--line); box-shadow:0 1px 0 rgba(0,0,0,.02); }
  .item-tk{ font-family:var(--mono); font-weight:600; font-size:16px; letter-spacing:.02em; line-height:1.1; }
  .item-co{ font-size:11.5px; color:var(--ink-faint); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item-one{ font-size:12.5px; color:var(--ink-soft); line-height:1.5; margin-top:7px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .item-left{ display:flex; flex-direction:column; align-items:center; gap:7px; padding-top:2px; }
  .v-tag{
    font-family:var(--body); font-weight:700; font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
    padding:3px 7px; border-radius:6px; white-space:nowrap;
  }
  .v-buy{ color:var(--buy); background:var(--buy-bg); }
  .v-watch{ color:var(--watch); background:var(--watch-bg); }
  .v-pass{ color:var(--pass); background:var(--pass-bg); }
  .v-none{ color:var(--none); background:var(--none-bg); }
  .dot-buy{ background:var(--buy); } .dot-watch{ background:var(--watch); }
  .dot-pass{ background:var(--pass); } .dot-none{ background:var(--none); }

  /* source-data staleness (card badge + reader line) */
  .src-badge{
    font-family:var(--body); font-weight:700; font-size:8.5px; letter-spacing:.02em;
    padding:2px 6px; border-radius:6px; white-space:nowrap;
  }
  .r-src{
    display:inline-flex; align-items:center; gap:5px; margin-top:8px;
    font-size:11.5px; font-weight:600; padding:4px 10px; border-radius:999px; cursor:default;
  }
  .src-aging{ color:var(--watch); background:var(--watch-bg); }
  .src-stale{ color:var(--pass);  background:var(--pass-bg);  }

  /* reader */
  .reader{ overflow:auto; background:var(--paper); }
  .reader-inner{ max-width:820px; margin:24px auto; padding:40px 52px 80px;
    background:var(--card-2); border:1px solid var(--line); border-radius:16px; box-shadow:0 1px 2px rgba(0,0,0,.03); }
  .r-back{ display:none; }
  .r-head{ display:flex; align-items:flex-start; gap:16px; padding-bottom:20px; border-bottom:1px solid var(--line); margin-bottom:10px; }
  .r-head > .r-meta{ flex:1; min-width:0; }
  .r-tk{ font-family:var(--mono); font-weight:600; font-size:34px; letter-spacing:.01em; line-height:1; }
  .r-co{ font-family:var(--display); font-size:17px; color:var(--ink-soft); margin-top:8px; }
  .r-date{ font-size:12px; color:var(--ink-faint); margin-top:6px; }
  .r-verdict{
    margin-left:auto; flex:none; text-align:center; display:flex; flex-direction:column; align-items:center; gap:5px;
  }
  .r-verdict .vbig{
    font-family:var(--display); font-weight:600; font-size:15px; letter-spacing:.04em; text-transform:uppercase;
    padding:7px 16px; border-radius:999px; border:1.5px solid currentColor;
  }
  .r-verdict .vlbl{ font-size:10px; color:var(--ink-faint); letter-spacing:.06em; text-transform:uppercase; }

  /* read-mode toggle (only shown when a brief has an "อ่านง่าย" block) */
  .r-toggle{ display:inline-flex; gap:4px; margin:14px 0 6px; padding:4px;
    background:var(--card); border:1px solid var(--line); border-radius:999px; }
  .r-toggle button{
    font-family:var(--display); font-size:14px; font-weight:600; cursor:pointer;
    padding:5px 18px; border-radius:999px; border:none; background:transparent; color:var(--ink-soft);
    transition:background .12s, color .12s;
  }
  .r-toggle button:hover{ color:var(--ink); }
  .r-toggle button.active{ background:var(--accent); color:var(--paper); }

  /* rendered markdown */
  .md-body{ font-size:15.5px; line-height:1.8; color:var(--ink); }
  .md-body p{ margin:.7em 0; }
  .md-body strong{ font-weight:700; color:var(--ink); }
  .md-body em{ color:var(--ink-soft); font-style:italic; }
  .md-h2{
    font-family:var(--display); font-weight:600; font-size:21px; letter-spacing:-.01em;
    margin:34px 0 12px; padding-top:18px; border-top:1px solid var(--line-soft);
    display:flex; align-items:center; gap:10px; color:var(--accent-deep);
  }
  .md-h2::before{ content:''; width:13px; height:13px; border-radius:4px; background:var(--accent); flex:none; transform:rotate(8deg); }
  .md-h2.h-bull{ color:var(--buy); } .md-h2.h-bull::before{ background:var(--buy); }
  .md-h2.h-bear{ color:var(--pass); } .md-h2.h-bear::before{ background:var(--pass); }
  .md-h2.h-kill{ color:var(--pass); } .md-h2.h-kill::before{ background:var(--pass); }
  .md-h2.h-verdict{ color:var(--accent-deep); } .md-h2.h-verdict::before{ background:var(--accent-deep); transform:none; border-radius:999px; }
  .md-h3{ font-family:var(--display); font-weight:600; font-size:17px; margin:22px 0 8px; color:var(--ink); }

  .bb-head{ font-family:var(--display); font-weight:700; font-size:16px; letter-spacing:.01em; margin:18px 0 6px; }
  .bb-head.h-bull{ color:var(--buy); } .bb-head.h-bear{ color:var(--pass); }

  .md-body ul,.md-body ol{ margin:.6em 0; padding-left:0; list-style:none; }
  .md-body ol{ counter-reset:n; }
  .md-body li{ position:relative; padding-left:26px; margin:.55em 0; line-height:1.7; }
  .md-body ul li::before{ content:''; position:absolute; left:6px; top:.62em; width:7px; height:7px;
    background:var(--accent); border-radius:2px; transform:rotate(10deg); }
  .md-body ol li{ counter-increment:n; }
  .md-body ol li::before{ content:counter(n); position:absolute; left:0; top:.05em;
    font-family:var(--mono); font-size:12px; font-weight:600; color:var(--accent);
    width:18px; height:18px; border:1.5px solid var(--line); border-radius:6px; text-align:center; line-height:16px; }

  .md-body blockquote{
    margin:1em 0; padding:12px 16px; background:var(--watch-bg);
    border-left:3px solid var(--watch); border-radius:0 8px 8px 0; color:var(--ink); font-size:14px;
  }
  .md-body hr{ border:none; border-top:1px dashed var(--line); margin:22px 0; }

  .verdict-stamp{
    display:inline-block; font-family:var(--display); font-weight:700; font-size:20px;
    letter-spacing:.06em; padding:8px 22px; border-radius:10px; margin:6px 0 4px; border:2px solid currentColor;
  }
  .verdict-stamp.v-buy{ color:var(--buy); background:var(--buy-bg); }
  .verdict-stamp.v-watch{ color:var(--watch); background:var(--watch-bg); }
  .verdict-stamp.v-pass{ color:var(--pass); background:var(--pass-bg); }

  /* related stocks */
  .related{ margin-top:28px; padding-top:18px; border-top:1px dashed var(--line); }
  .related-label{ font-family:var(--display); font-size:13px; color:var(--ink-faint); margin-bottom:9px; }
  .related-chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .rel-chip{
    font-family:var(--body); font-size:12.5px; font-weight:600; cursor:pointer;
    padding:6px 12px; border-radius:999px; border:1px solid var(--line);
    background:var(--card); color:var(--ink-soft); display:inline-flex; align-items:center; gap:5px;
  }
  .rel-chip:hover{ border-color:var(--accent); color:var(--ink); }
  .rel-chip em{ font-style:normal; font-weight:400; color:var(--ink-faint); font-size:11px; }
  .rel-chip.rel-pending{ opacity:.55; cursor:default; }
  .rel-chip.rel-pending:hover{ border-color:var(--line); color:var(--ink-soft); }

  .empty{ display:grid; place-items:center; height:100%; color:var(--ink-faint); font-family:var(--display); font-size:18px; }

  /* scrollbars */
  .sidebar::-webkit-scrollbar,.reader::-webkit-scrollbar{ width:10px; }
  .sidebar::-webkit-scrollbar-thumb,.reader::-webkit-scrollbar-thumb{ background:var(--line); border-radius:99px; border:3px solid var(--paper); }

  /* ---------------- responsive ---------------- */
  @media (max-width:820px){
    .shell{ grid-template-columns:1fr; height:calc(100vh - 57px); }
    .reader{ display:none; }
    .shell.detail .sidebar{ display:none; }
    .shell.detail .reader{ display:block; }
    .search{ width:160px; }
    .reader-inner{ padding:24px 20px 90px; margin:0; border:none; border-radius:0; }
    .r-back{ display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-family:var(--display);
      font-size:15px; color:var(--accent); margin-bottom:16px; background:none; border:none; padding:0; }
    .r-tk{ font-size:28px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="mark">Stock Briefs</span>
    <span class="sub">research notes · มิ.ย. 2026</span>
  </div>
  <div class="spacer"></div>
  <label class="search">
    <span class="mag"></span>
    <input type="text" id="search" placeholder="Search ticker…" autocomplete="off">
  </label>
</div>

<div class="shell" id="shell">
  <nav class="rail">
    <a href="index.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h11a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><path d="M8 4v16"/><path d="M11 8h4M11 12h4"/></svg><span>Briefs</span></a>
    <a href="glossary.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h11a2 2 0 0 1 2 2v13H7a2 2 0 0 0-2 2V4z"/><path d="M5 19a2 2 0 0 0 2 2h11"/></svg><span>คำศัพท์</span></a>
    <a href="notes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7a2 2 0 0 1 2-2h3l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7z"/></svg><span>ข้อมูล</span></a>
    <a href="team.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M4 20c0-2.8 2.2-5 5-5s5 2.2 5 5"/><path d="M16 5.5a3 3 0 0 1 0 5.5"/><path d="M18 20c0-2.2-1-4-2.5-4.7"/></svg><span>ทีม AI</span></a>
  </nav>
  <aside class="sidebar">
    <div class="filters" id="filters">
      <button class="chip active" data-v="all">All</button>
      <button class="chip" data-v="buy"><span class="c-dot dot-buy"></span>Buy</button>
      <button class="chip" data-v="watch"><span class="c-dot dot-watch"></span>Watch</button>
      <button class="chip" data-v="pass"><span class="c-dot dot-pass"></span>Pass</button>
    </div>
    <div class="list" id="list"></div>
  </aside>

  <main class="reader" id="reader">
    <div class="reader-inner">
      <button class="r-back" id="back">‹ back to list</button>
      <div id="brief"></div>
    </div>
  </main>
</div>

<script src="briefs-manifest.js"></script>
<script src="relationships-data.js"></script>
<script src="md-render.js"></script>
<script>
  const VLABEL = { buy:'Buy', watch:'Watch', pass:'Pass', none:'No verdict' };
  let filter='all', search='', selected=null;
  const mdCache = {};  // cache fetched .md content in memory

  // Source-data freshness: age is computed LIVE from the oldest source's fetched-date
  // (baked into the manifest as b.src by sync-briefs.ps1). Tiers: fresh <90d (no badge),
  // aging 90-180d (yellow), stale >180d (red). 90d = 1 quarter.
  function sourceTier(dateStr){
    if(!dateStr) return null;
    const t = Date.parse(dateStr + 'T00:00:00');
    if(isNaN(t)) return null;
    const days = Math.floor((Date.now() - t) / 86400000);
    if(days < 90) return null;
    const months = Math.round(days / 30);
    return { tier: days > 180 ? 'stale' : 'aging', days, months };
  }

  // read mode: 'easy' = อ่านง่าย summary only, 'full' = thesis เต็ม. default อ่านง่าย.
  let readMode = 'easy';
  try{ readMode = localStorage.getItem('sb_readmode') || 'easy'; }catch(e){}

  // Split a brief into its "อ่านง่าย" block and the full thesis (with that block removed).
  // The อ่านง่าย block is the first H2 in the doc whose title does NOT start with a digit
  // (numbered sections like "## 1. Company snapshot" are the thesis). Encoding-independent.
  function splitBrief(md){
    const lines = md.replace(/\r/g,'').split('\n');
    let start = -1;
    for(let i=0;i<lines.length;i++){
      const m = lines[i].match(/^##\s+(.*\S)\s*$/);
      if(m){ if(!/^\d/.test(m[1])) start = i; break; }  // inspect only the first H2
    }
    if(start === -1) return { hasEasy:false, easy:'', full:md };
    let end = lines.length;
    for(let i=start+1;i<lines.length;i++){ if(/^##\s+/.test(lines[i])){ end = i; break; } }
    const easy = lines.slice(start+1, end).join('\n').trim();
    const full = lines.slice(0, start).concat(lines.slice(end)).join('\n').trim();
    return { hasEasy:true, easy, full };
  }

  const listEl = document.getElementById('list');
  const briefEl = document.getElementById('brief');
  const shell   = document.getElementById('shell');

  function visible(){
    return MANIFEST.filter(b=>{
      if(filter!=='all' && b.verdict!==filter) return false;
      if(search && !(b.tk.toLowerCase().includes(search)||b.co.toLowerCase().includes(search))) return false;
      return true;
    });
  }

  function renderList(){
    listEl.innerHTML='';
    const items = visible();
    if(!items.length){ listEl.innerHTML='<p style="padding:18px;color:var(--ink-faint);font-size:13px">No matches.</p>'; return; }
    items.forEach(b=>{
      const el=document.createElement('div');
      el.className='item'+(b.tk===selected?' active':'');
      const st = sourceTier(b.src);
      const srcBadge = st ? `<span class="src-badge src-${st.tier}" title="ข้อมูลต้นทางเก่าสุด ${b.src}${b.srcFile?' ('+b.srcFile+')':''}">~${st.months}ด</span>` : '';
      el.innerHTML=`
        <div class="item-left">
          <span class="v-tag v-${b.verdict}">${b.verdict==='none'?'—':VLABEL[b.verdict]}</span>
          ${srcBadge}
        </div>
        <div>
          <div class="item-tk">${b.tk}</div>
          <div class="item-co">${b.co}</div>
          <div class="item-one">${b.one}</div>
        </div>`;
      el.onclick=()=>select(b.tk);
      listEl.appendChild(el);
    });
  }

  const REL_TYPE_LABEL = { competitor:'คู่แข่ง', partner:'พาร์ทเนอร์', government:'รัฐบาล' };

  function relatedFor(tk){
    if(typeof RELATIONSHIPS === 'undefined') return [];
    return RELATIONSHIPS.filter(r=>r.tickers.split(',').map(s=>s.trim()).includes(tk));
  }

  // label describes the OTHER ticker's role relative to the ticker currently being viewed (tk)
  function relLabel(r, tk){
    if(r.type === 'supplier'){
      return (r.from === tk) ? 'ลูกค้า' : 'ผู้ผลิตให้';
    }
    return REL_TYPE_LABEL[r.type] || r.type;
  }

  function renderRelated(tk){
    const rels = relatedFor(tk);
    if(!rels.length) return '';
    const chips = rels.map(r=>{
      const other = r.tickers.split(',').map(s=>s.trim()).find(t=>t!==tk) || '';
      const label = relLabel(r, tk);
      if(r.pending){
        // government (USGOV) is never a stock -- it will never get a brief, so don't say "waiting for one"
        if(r.type === 'government'){
          return `<span class="rel-chip rel-pending" title="${other} ไม่ใช่หุ้น ไม่มี brief">${other} <em>(หน่วยงานรัฐ)</em></span>`;
        }
        return `<span class="rel-chip rel-pending" title="${other} ยังไม่มี brief">${other} <em>(${label} · รอ brief)</em></span>`;
      }
      return `<button class="rel-chip" data-tk="${other}" title="${r.body}">${other} <em>(${label})</em></button>`;
    }).join('');
    return `<div class="related" id="related"><div class="related-label">หุ้นที่เกี่ยวข้อง</div><div class="related-chips">${chips}</div></div>`;
  }

  function renderReader(b, mdText){
    const vbadge = b.verdict==='none'
      ? `<div class="r-verdict"><span class="vbig v-none" style="border-color:var(--none);color:var(--none)">— no verdict</span><span class="vlbl">ยังไม่สรุป</span></div>`
      : `<div class="r-verdict"><span class="vbig v-${b.verdict}">${VLABEL[b.verdict]}</span><span class="vlbl">verdict</span></div>`;
    const st = sourceTier(b.src);
    const srcLine = st
      ? `<div class="r-src src-${st.tier}" title="ไฟล์เก่าสุด: ${b.srcFile||'—'} — ควร refetch ก่อน re-brief">⚠ ข้อมูลต้นทางเก่าสุด ${b.src} (~${st.months} เดือน)</div>`
      : '';
    const parts = splitBrief(mdText);
    const showEasy = parts.hasEasy && readMode === 'easy';
    const bodyMd = showEasy ? parts.easy : parts.full;
    const toggle = parts.hasEasy ? `
      <div class="r-toggle" id="rtoggle">
        <button data-m="easy" class="${readMode==='easy'?'active':''}">อ่านง่าย</button>
        <button data-m="full" class="${readMode==='full'?'active':''}">ฉบับเต็ม</button>
      </div>` : '';
    briefEl.innerHTML = `
      <div class="r-head">
        <div class="r-meta">
          <div class="r-tk">${b.tk}</div>
          <div class="r-co">${b.co}</div>
          <div class="r-date">Brief · ${b.date}</div>
          ${srcLine}
        </div>
        ${vbadge}
      </div>
      ${toggle}
      <div class="md-body">${renderBrief(bodyMd)}</div>
      ${renderRelated(b.tk)}`;
    const tg = document.getElementById('rtoggle');
    if(tg) tg.addEventListener('click', e=>{
      const btn = e.target.closest('button'); if(!btn) return;
      readMode = btn.dataset.m;
      try{ localStorage.setItem('sb_readmode', readMode); }catch(e){}
      renderReader(b, mdText);
    });
    const rel = document.getElementById('related');
    if(rel) rel.addEventListener('click', e=>{
      const btn = e.target.closest('.rel-chip'); if(!btn || !btn.dataset.tk) return;
      select(btn.dataset.tk);
    });
    document.getElementById('reader').scrollTop=0;
  }

  async function select(tk){
    selected=tk;
    const b=MANIFEST.find(x=>x.tk===tk);
    if(!b) return;
    shell.classList.add('detail');
    renderList();
    try{ localStorage.setItem('sb_selected', tk); }catch(e){}

    // show loading placeholder while fetching
    if(!mdCache[tk]){
      briefEl.innerHTML=`<div style="padding:40px 0;color:var(--ink-faint);font-family:var(--display);font-size:17px">Loading ${tk}…</div>`;
      try{
        const res = await fetch('./briefs/'+tk+'.md');
        if(!res.ok) throw new Error(res.status);
        mdCache[tk] = await res.text();
      } catch(e){
        briefEl.innerHTML=`<div style="padding:40px 0;color:var(--pass);font-size:14px">ไม่พบไฟล์ briefs/${tk}.md</div>`;
        return;
      }
    }
    renderReader(b, mdCache[tk]);
  }

  // filters
  document.getElementById('filters').addEventListener('click',e=>{
    const c=e.target.closest('.chip'); if(!c) return;
    filter=c.dataset.v;
    document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x===c));
    renderList();
  });
  // search
  document.getElementById('search').addEventListener('input',e=>{
    search=e.target.value.toLowerCase().trim(); renderList();
  });
  // back (mobile)
  document.getElementById('back').onclick=()=>shell.classList.remove('detail');

  // init
  renderList();
  let initial=null;
  try{ initial=localStorage.getItem('sb_selected'); }catch(e){}
  if(!initial || !MANIFEST.find(b=>b.tk===initial)) initial=MANIFEST[0].tk;
  if(window.matchMedia('(min-width:821px)').matches){ select(initial); selected=initial; }
  else{ selected=initial; }
</script>
</body>
</html>
