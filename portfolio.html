<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>พอร์ต · Stock Briefs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;padding:14px 26px;
    background:color-mix(in srgb,var(--paper) 92%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:baseline;gap:12px;}
  .backlink{font-family:var(--display);font-size:15px;color:var(--accent);text-decoration:none;}
  .backlink:hover{color:var(--accent-deep);}
  .brand .mark{font-family:var(--display);font-weight:600;font-size:22px;}
  .wrap{max-width:680px;margin:0 auto;padding:26px 24px 100px;}
  .updated{font-size:12px;color:var(--ink-faint);margin:0 2px 16px;}
  .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;}
  .stat .lbl{font-size:11.5px;color:var(--ink-faint);}
  .stat .val{font-family:var(--display);font-size:20px;color:var(--accent-deep);margin-top:3px;}
  .banner{border-radius:10px;padding:12px 16px;font-size:13.5px;line-height:1.65;margin:18px 0;}
  .banner.bad{background:#faece7;color:#993c1d;border:1px solid #e3bbab;}
  .banner.ok{background:#e3efd9;color:#3b6d11;border:1px solid #c4d9aa;}
  .sec-h{font-family:var(--display);font-weight:600;font-size:18px;color:var(--accent-deep);margin:22px 0 14px;}
  .row{margin-bottom:15px;}
  .row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
  .row-tk{font-family:var(--display);font-size:17px;}
  .row-meta{color:var(--ink-soft);font-size:13px;}
  .badge{font-size:10.5px;padding:2px 8px;border-radius:999px;margin-left:8px;white-space:nowrap;}
  .bar{height:14px;border-radius:7px;background:var(--line-soft);overflow:hidden;}
  .bar > span{display:block;height:100%;border-radius:7px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <a href="index.html" class="backlink">‹ Stock Briefs</a>
    <span class="mark">พอร์ต</span>
  </div>
</div>
<div class="wrap">
  <div class="updated" id="updated"></div>
  <div class="summary" id="summary"></div>
  <div id="banners"></div>
  <div class="sec-h">สัดส่วนการถือ (% ของพอร์ตรวม)</div>
  <div id="rows"></div>
</div>
<script src="portfolio-data.js"></script>
<script>
  const P = window.PORTFOLIO || {holdings:[]};
  const f2 = n => '$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  document.getElementById('updated').textContent = 'อัปเดต ' + (P.updated||'-') + ' · ตัวเลขจาก portfolio.md';
  document.getElementById('summary').innerHTML =
     '<div class="stat"><div class="lbl">มูลค่ารวม</div><div class="val">'+f2(P.total)+'</div></div>'
    +'<div class="stat"><div class="lbl">กำไร/ขาดทุน (หุ้น)</div><div class="val" style="font-size:16px">'+(P.pl||'-')+'</div></div>'
    +'<div class="stat"><div class="lbl">เงินสด</div><div class="val">'+(P.cashPct||0)+'%</div></div>';

  function level(pct){
    if(pct>30) return {fill:'#b5532f', badge:'เยอะเกินไป', bg:'#faece7', tx:'#993c1d'};
    if(pct>=20) return {fill:'#bd8a3a', badge:'ค่อนข้างเยอะ', bg:'#faeeda', tx:'#854f0b'};
    return {fill:'var(--accent)', badge:'', bg:'', tx:''};
  }

  let banners='';
  const big=(P.holdings||[]).filter(h=>h.pctPort>30);
  if(big.length){
    banners+='<div class="banner bad"><b>⚠️ กระจุกตัวสูง:</b> '
      +big.map(h=>h.ticker+' = '+h.pctPort+'% ของพอร์ต').join(', ')
      +' — ก้อนเดียวใหญ่เกินไป ถ้า thesis ตัวนี้พังจะกระทบพอร์ตหนัก ควรให้ Lucas ดูเรื่องลดสัดส่วน</div>';
  }
  if(P.cashPct>=15){
    banners+='<div class="banner ok">เงินสด '+P.cashPct+'% — ผ่าน rule ขั้นต่ำ 15% ของ Lucas</div>';
  } else if(P.cashPct>0){
    banners+='<div class="banner bad">เงินสด '+P.cashPct+'% — ต่ำกว่า rule ขั้นต่ำ 15% ของ Lucas</div>';
  }
  document.getElementById('banners').innerHTML=banners;

  const rows=(P.holdings||[]).slice().sort((a,b)=>b.pctPort-a.pctPort);
  const cashRow={ticker:'เงินสด',value:P.cashValue,pctPort:P.cashPct,cash:true};
  document.getElementById('rows').innerHTML=rows.concat([cashRow]).map(h=>{
    const lv=h.cash?{fill:'#3b6d11',badge:''}:level(h.pctPort);
    return '<div class="row"><div class="row-top">'
      +'<span class="row-tk">'+h.ticker
        +(lv.badge?'<span class="badge" style="background:'+lv.bg+';color:'+lv.tx+'">'+lv.badge+'</span>':'')
      +'</span>'
      +'<span class="row-meta">'+f2(h.value)+' · '+(h.pctPort||0)+'%</span></div>'
      +'<div class="bar"><span style="width:'+Math.min(100,(h.pctPort||0))+'%;background:'+lv.fill+'"></span></div></div>';
  }).join('');
</script>
</body>
</html>
