<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ทีม AI · Stock Briefs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;padding:14px 26px;
    background:color-mix(in srgb,var(--paper) 92%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:baseline;gap:12px;}
  .backlink{font-family:var(--display);font-size:15px;color:var(--accent);text-decoration:none;}
  .backlink:hover{color:var(--accent-deep);}
  .brand .mark{font-family:var(--display);font-weight:600;font-size:22px;}
  .wrap{max-width:780px;margin:0 auto;padding:28px 24px 100px;}
  .intro{font-size:14px;color:var(--ink-soft);line-height:1.7;margin:0 2px 26px;}
  .group{margin-bottom:30px;}
  .group-h{font-family:var(--display);font-weight:600;font-size:20px;color:var(--accent-deep);margin:0 0 4px;display:flex;align-items:center;gap:9px;}
  .group-h .dot{width:10px;height:10px;border-radius:3px;background:var(--accent);transform:rotate(8deg);}
  .group-sub{font-size:12.5px;color:var(--ink-faint);margin:0 0 14px 19px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
  .card .name{font-family:var(--display);font-weight:600;font-size:17px;color:var(--ink);}
  .card .role{font-size:13px;color:var(--ink-soft);line-height:1.6;margin:6px 0 9px;}
  .card .when{font-size:11.5px;color:var(--ink-faint);border-top:1px solid var(--line-soft);padding-top:8px;}
  .skills{display:flex;flex-direction:column;gap:10px;}
  .skill{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:baseline;background:var(--card-2);border:1px solid var(--line-soft);border-radius:10px;padding:11px 14px;}
  .skill .cmd{font-family:var(--display);font-size:16px;color:var(--accent-deep);white-space:nowrap;}
  .skill .desc{font-size:13px;color:var(--ink-soft);line-height:1.55;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <a href="index.html" class="backlink">‹ Stock Briefs</a>
    <span class="mark">ทีม AI</span>
  </div>
</div>
<div class="wrap">
  <p class="intro">ระบบนี้มี AI ผู้ช่วยหลายตัว แต่ละตัวมีหน้าที่เฉพาะ ทำงานเป็นทีมเวลาสั่ง <b>/brief</b> และมีเครื่องมือ (คำสั่ง) ไว้เก็บข้อมูล/ดูแลพอร์ต ด้านล่างคือใครทำอะไร</p>
  <div id="groups"></div>
  <div class="group">
    <div class="group-h"><span class="dot"></span>เครื่องมือ (คำสั่ง)</div>
    <div class="group-sub">พิมพ์คำสั่งเหล่านี้เพื่อสั่งงาน</div>
    <div class="skills" id="skills"></div>
  </div>
</div>
<script>
  const GROUPS=[
    {h:'ก่อนวิจัย',sub:'จัดระเบียบไอเดียก่อนลงมือ',agents:[
      {name:'Clove',role:'จับไอเดียดิบๆ ("ตัวนี้น่าสนใจ") มาจัดเป็นสมมติฐานที่ทดสอบได้ ก่อนเริ่มวิจัยจริง',when:'ใช้ก่อน /brief'},
    ]},
    {h:'หาข้อมูล',sub:'ดึงวัตถุดิบสำหรับ brief',agents:[
      {name:'Sova',role:'ดึงงบ 10-K/20-F จาก SEC — บริษัททำอะไร + สุขภาพการเงิน',when:'ทำงานใน /brief'},
      {name:'Vyse',role:'ดึง earnings call — ตัวเลขไตรมาสล่าสุด + guidance + สิ่งที่ผู้บริหารพูด',when:'ทำงานใน /brief'},
      {name:'Tracer',role:'ข่าว 7 วันล่าสุด + นักวิเคราะห์ขยับ + เหตุการณ์ที่จะมาถึง',when:'ทำงานใน /brief'},
    ]},
    {h:'ตรวจ + เรียบเรียง',sub:'ทำให้ brief เชื่อถือได้และอ่านง่าย',agents:[
      {name:'Rey',role:'หาจุดอ่อนที่แรงที่สุด (bear case) + เขียน kill condition ให้คมและเช็คได้',when:'ทำงานใน /brief'},
      {name:'Eve',role:'ตรวจทุกตัวเลขในร่างว่าตรงกับ source จริงไหม จับเลขที่แต่งขึ้น',when:'ทำงานใน /brief'},
      {name:'Mira',role:'เขียนสรุป "อ่านง่าย" ภาษาคน ไม่มีศัพท์ สำหรับมือใหม่',when:'ทำงานใน /brief'},
    ]},
    {h:'ตัดสินใจ',sub:'เปลี่ยนข้อมูลเป็นคำตัดสิน',agents:[
      {name:'Neon',role:'ตัดสิน ซื้อ/รอ/ผ่าน ด้วยเกณฑ์ 5 ข้อ (เน้น moat + ระยะยาว) ตัดสินเฉพาะ "ตัวหุ้นดีพอไหม"',when:'ทำงานใน /brief'},
      {name:'Cypher',role:'ประเมินมูลค่าด้วย FCF หา fair value + จุดเข้าซื้อ (ต้องบอกราคาปัจจุบัน)',when:'เรียกเอง หลัง brief'},
      {name:'Lucas',role:'ดูพอร์ต — สัดส่วนแต่ละตัว, เงินสด, กระจุกตัวเกินไหม (ไม่เลือกหุ้นให้)',when:'เรียกเอง'},
    ]},
  ];
  const SKILLS=[
    {cmd:'/brief <หุ้น>',desc:'สั่งวิจัยหุ้น 1 ตัว — เรียกทั้งทีมข้างบนทำงานร่วมกันจนได้ brief ครบ + ขึ้นเว็บ'},
    {cmd:'/term <คำ>',desc:'อธิบายคำศัพท์แบบมือใหม่เข้าใจ แล้วเก็บขึ้นคลังคำศัพท์'},
    {cmd:'/note',desc:'เก็บข้อมูลที่อยู่ได้นาน (เปรียบเทียบหุ้น/ธีม/หลักการ) ขึ้นคลังข้อมูล'},
    {cmd:'/prices',desc:'อัปเดตราคาหุ้นในพอร์ตให้เป็นราคาสด'},
    {cmd:'/summary',desc:'บันทึกว่าวันนี้ทำอะไรไปบ้างลงไดอารี่ (journal)'},
    {cmd:'/audit',desc:'ตรวจสุขภาพระบบ AI หาช่องโหว่/ความซ้ำซ้อน'},
  ];
  document.getElementById('groups').innerHTML=GROUPS.map(g=>
    '<div class="group"><div class="group-h"><span class="dot"></span>'+g.h+'</div><div class="group-sub">'+g.sub+'</div><div class="grid">'
    +g.agents.map(a=>'<div class="card"><div class="name">'+a.name+'</div><div class="role">'+a.role+'</div><div class="when">'+a.when+'</div></div>').join('')
    +'</div></div>').join('');
  document.getElementById('skills').innerHTML=SKILLS.map(s=>
    '<div class="skill"><span class="cmd">'+s.cmd+'</span><span class="desc">'+s.desc+'</span></div>').join('');
</script>
</body>
</html>
