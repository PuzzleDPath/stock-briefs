<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คลังคำศัพท์ · Stock Briefs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}

  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;padding:14px 26px;
    background:color-mix(in srgb,var(--paper) 92%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:baseline;gap:12px;flex:none;}
  .backlink{font-family:var(--display);font-size:15px;color:var(--accent);text-decoration:none;white-space:nowrap;}
  .backlink:hover{color:var(--accent-deep);}
  .brand .mark{font-family:var(--display);font-weight:600;font-size:22px;letter-spacing:-.01em;}
  .spacer{flex:1;}
  .search{display:flex;align-items:center;gap:9px;flex:none;width:230px;max-width:42vw;padding:8px 14px;
    background:var(--card-2);border:1px solid var(--line);border-radius:999px;}
  .search:focus-within{border-color:var(--accent);}
  .search input{border:none;background:transparent;outline:none;width:100%;font-family:var(--body);font-size:14px;color:var(--ink);}
  .search .mag{width:13px;height:13px;border:2px solid var(--ink-faint);border-radius:999px;position:relative;flex:none;}
  .search .mag::after{content:'';position:absolute;width:6px;height:2px;background:var(--ink-faint);bottom:-3px;right:-3px;transform:rotate(45deg);}

  .wrap{max-width:760px;margin:0 auto;padding:26px 24px 100px;}
  .count{font-size:12px;color:var(--ink-faint);margin:0 2px 16px;letter-spacing:.02em;}
  .term-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px;transition:box-shadow .2s,border-color .2s;}
  .term-card.hl{border-color:var(--accent);box-shadow:0 0 0 3px var(--line-soft);}
  .term-name{font-family:var(--display);font-weight:600;font-size:20px;color:var(--accent-deep);margin:0 0 8px;}
  .term-body{font-size:15px;line-height:1.75;color:var(--ink);}
  .term-body p{margin:.5em 0;}
  .term-body strong{font-weight:700;}
  .xref{color:var(--accent);text-decoration:none;border-bottom:1px dashed var(--accent);cursor:pointer;}
  .xref:hover{color:var(--accent-deep);}
  .empty{color:var(--ink-faint);font-family:var(--display);font-size:18px;text-align:center;padding:40px 0;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <a href="index.html" class="backlink">‹ Stock Briefs</a>
    <span class="mark">คลังคำศัพท์</span>
  </div>
  <div class="spacer"></div>
  <label class="search">
    <span class="mag"></span>
    <input type="text" id="q" placeholder="ค้นหาคำศัพท์…" autocomplete="off">
  </label>
</div>

<div class="wrap">
  <div class="count" id="count"></div>
  <div id="list"></div>
</div>

<script src="glossary-data.js"></script>
<script>
  const G = (window.GLOSSARY || []).slice().sort((a,b)=>a.term.localeCompare(b.term,'th'));
  const slugToTerm = {}; G.forEach(t=>slugToTerm[t.slug]=t.term);
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function renderBody(md){
    return md.split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean).map(b=>{
      let h = esc(b);
      h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
      h = h.replace(/\[\[([a-z0-9-]+)\]\]/g,(m,slug)=>'<a class="xref" href="#g-'+slug+'">'+esc(slugToTerm[slug]||slug)+'</a>');
      h = h.replace(/\n/g,'<br>');
      return '<p>'+h+'</p>';
    }).join('');
  }

  function render(filter){
    const f = (filter||'').toLowerCase().trim();
    const items = G.filter(t=> !f || t.term.toLowerCase().includes(f) || t.body.toLowerCase().includes(f) || t.slug.includes(f));
    countEl.textContent = items.length + ' คำ';
    if(!items.length){ listEl.innerHTML='<p class="empty">ไม่พบคำที่ค้นหา</p>'; return; }
    listEl.innerHTML = items.map(t=>'<div class="term-card" id="g-'+t.slug+'"><h2 class="term-name">'+esc(t.term)+'</h2><div class="term-body">'+renderBody(t.body)+'</div></div>').join('');
  }

  function jump(slug){
    const el = document.getElementById('g-'+slug);
    if(!el) return;
    el.scrollIntoView({behavior:'smooth',block:'center'});
    el.classList.add('hl'); setTimeout(()=>el.classList.remove('hl'),1500);
  }

  listEl.addEventListener('click',e=>{
    const a = e.target.closest('a.xref'); if(!a) return;
    e.preventDefault(); jump(a.getAttribute('href').slice(3));
  });
  document.getElementById('q').addEventListener('input',e=>render(e.target.value));

  render('');
</script>
</body>
</html>
